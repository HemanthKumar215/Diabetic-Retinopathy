<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RetinaFlow WebAR</title>
    <!-- A-Frame and MindAR for WebAR tracking -->
    <script src="./aframe.min.js"></script>
    <script src="./mindar-image-aframe.prod.js"></script>
  <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
      
      #ui-layer {
        position: absolute;
        top: 0; left: 0; width: 100%;
        z-index: 100;
        pointer-events: none;
        padding: 24px;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      }
      .title {
        color: #fff; font-size: 28px; font-weight: 900;
        text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        letter-spacing: -0.03em;
      }
      .title span { color: #06b6d4; }
      .subtitle {
        color: #e2e8f0; font-size: 14px; margin-top: 4px;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      }
      
      #back-btn {
        position: absolute; bottom: 30px; left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        background: rgba(6, 182, 212, 0.2);
        border: 1px solid rgba(6, 182, 212, 0.5);
        color: #06b6d4;
        border-radius: 12px;
        font-weight: bold;
        text-decoration: none;
        pointer-events: auto;
        backdrop-filter: blur(10px);
        z-index: 100;
      }

      /* MindAR loading screen override */
      .mindar-ui-overlay { background: rgba(0,0,0,0.8); }
      .mindar-ui-loading .loader { border-top-color: #06b6d4 !important; }

      /* Dynamic Compiler UI */
      #compiling-ui {
        position: absolute; inset: 0; background: #000; color: #06b6d4;
        z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: monospace; text-align: center;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      .compile-loader {
        border: 4px solid #333; border-top: 4px solid #06b6d4; border-radius: 50%;
        width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div id="compiling-ui">
      <div class="compile-loader"></div>
      <div id="compile-text" style="font-size: 16px; font-weight: bold; margin-bottom: 8px;">Initializing AI Engine...</div>
      <div style="font-size: 12px; color: #64748b;">Generating AR tracking footprint</div>
    </div>

    <div id="ui-layer" style="display:none;">
      <div class="title">Retina<span>Flow</span> AR</div>
      <div class="subtitle">Point camera at the exact image on your laptop screen to view AI diagnosis.</div>
    </div>
    
    <a href="javascript:history.back()" id="back-btn" style="display:none;">← Close AR View</a>

    <div id="scene-container"></div>

    <script>
       const params = new URLSearchParams(window.location.search);
       const grade = params.get('grade') || '0';
       const heatmapUrl = params.get('heatmap') || '';
       const imageUrl = params.get('image') || '';
       
       const GRADE_META = {
         '0': { name: 'No DR (Healthy)', color: '#10b981' },
         '1': { name: 'Mild NPDR', color: '#facc15' },
         '2': { name: 'Moderate NPDR', color: '#fb923c' },
         '3': { name: 'Severe NPDR', color: '#ef4444' },
         '4': { name: 'Proliferative DR', color: '#b91c1c' }
       };
       const meta = GRADE_META[grade] || GRADE_META['0'];

       function loadImage(src) {
         return new Promise((res, rej) => {
           const img = new Image();
           // Removed crossOrigin="anonymous" because we are fetching from the same origin (Vite proxy)
           // This prevents potential FastAPI StaticFiles CORS stripping issues.
           img.onload = () => res(img);
           img.onerror = (err) => rej(new Error("Failed to load image from " + src));
           img.src = src;
         });
       }

       async function startAR() {
           const compileText = document.getElementById('compile-text');
           let targetSrc = './targets.mind'; // Fallback

           if (imageUrl) {
               try {
                   compileText.innerText = 'Downloading AR Anchor...';
                   const compiler = new MINDAR.IMAGE.Compiler();
                   const img = await loadImage('/ar_anchor.jpg');
                   
                   await compiler.compileImageTargets([img], (progress) => {
                       compileText.innerText = `Compiling AR Target: ${(progress * 100).toFixed(0)}%`;
                   });
                   
                   compileText.innerText = 'Finalizing...';
                   const buffer = await compiler.exportData();
                   const blob = new Blob([buffer]);
                   targetSrc = URL.createObjectURL(blob);
                   
                   // Modify subtitle to show dynamic compilation worked
                   document.querySelector('.subtitle').innerText = "Dynamic Target Ready! Point camera at the geometric AR Marker on your laptop.";
                   document.querySelector('.subtitle').style.color = "#10b981"; // Green to indicate success
               } catch(e) {
                   console.error("Compilation error:", e);
                   alert("Failed to dynamically compile the AR target. Falling back to old target. Error: " + e.message);
               }
           }

           // Hide compiler UI and show main UI
           document.getElementById('compiling-ui').style.display = 'none';
           document.getElementById('ui-layer').style.display = 'block';
           document.getElementById('back-btn').style.display = 'block';

           // Inject A-Frame Scene dynamically
           // We explicitly disable uiScanning so the screen doesn't go dark
           const sceneHTML = `
             <a-scene 
               mindar-image="imageTargetSrc: ${targetSrc}; autoStart: true; uiError:yes; uiLoading:yes; uiScanning:no;" 
               color-space="sRGB" 
               renderer="colorManagement: true, physicallyCorrectLights" 
               vr-mode-ui="enabled: false" 
               device-orientation-permission-ui="enabled: false">
               
               <a-assets>
                 <img id="base-img" src="${imageUrl}">
                 <img id="heatmap-tex" src="${heatmapUrl || ''}">
               </a-assets>

               <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

               <a-entity mindar-image-target="targetIndex: 0">
                 <!-- The AR dashboard floating above the marker -->
                 <a-entity position="0 0.8 0" scale="1.2 1.2 1.2">
                   <!-- Base Eye Image -->
                   <a-plane src="#base-img" position="0 0 0" height="1" width="1" rotation="0 0 0"></a-plane>
                   <!-- Heatmap Overlay -->
                   ${heatmapUrl ? '<a-plane src="#heatmap-tex" position="0 0 0.01" height="1" width="1" rotation="0 0 0" opacity="0.85" material="transparent: true; alphaTest: 0.1;"></a-plane>' : ''}
                   
                   <!-- Diagnostic Text -->
                   <a-entity position="0 0.65 0">
                     <a-plane width="1.2" height="0.2" color="#000" opacity="0.8" position="0 0 -0.01" material="transparent: true"></a-plane>
                     <a-text value="GRADE ${grade}: ${meta.name.toUpperCase()}" align="center" position="0 0 0" scale="0.6 0.6 0.6" color="${meta.color}" font="kelsonsans"></a-text>
                   </a-entity>
                   
                   <a-plane position="0 0 0.02" width="1" height="1" material="shader: flat; color: ${meta.color}; wireframe: true; opacity: 0.5"></a-plane>
                 </a-entity>
               </a-entity>
             </a-scene>
           `;
           
           document.getElementById('scene-container').innerHTML = sceneHTML;
       }

       // Start the pipeline
       startAR();
    </script>
  </body>
</html>
