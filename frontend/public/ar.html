<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RetinaFlow WebAR</title>
    <!-- A-Frame and MindAR for WebAR tracking -->
    <script src="./aframe.min.js"></script>
    <script src="./mindar-image-aframe.prod.js"></script>
  <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
      
      #ui-layer {
        position: absolute;
        top: 0; left: 0; width: 100%;
        z-index: 100;
        pointer-events: none;
        padding: 24px;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      }
      .title {
        color: #fff; font-size: 28px; font-weight: 900;
        text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        letter-spacing: -0.03em;
      }
      .title span { color: #06b6d4; }
      .subtitle {
        color: #e2e8f0; font-size: 14px; margin-top: 4px;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      }
      
      #back-btn {
        position: absolute; bottom: 30px; left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        background: rgba(6, 182, 212, 0.2);
        border: 1px solid rgba(6, 182, 212, 0.5);
        color: #06b6d4;
        border-radius: 12px;
        font-weight: bold;
        text-decoration: none;
        pointer-events: auto;
        backdrop-filter: blur(10px);
        z-index: 100;
      }

      /* MindAR loading screen override */
      .mindar-ui-overlay { background: rgba(0,0,0,0.8); }
      .mindar-ui-loading .loader { border-top-color: #06b6d4 !important; }

      /* Dynamic Compiler UI */
      #compiling-ui {
        position: absolute; inset: 0; background: #000; color: #06b6d4;
        z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: monospace; text-align: center;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      .compile-loader {
        border: 4px solid #333; border-top: 4px solid #06b6d4; border-radius: 50%;
        width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px;
      }
    </style>
  </head>
    <div id="ui-layer">
      <div class="title">Retina<span>Flow</span> AR</div>
      <div class="subtitle" id="subtitle-text">Point camera at the AR Marker on your laptop.</div>
    </div>
    
    <a href="javascript:history.back()" id="back-btn">← Close AR View</a>

    <!-- Static A-Frame Scene to prevent iOS layout bugs -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiError:yes; uiLoading:yes; uiScanning:no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="base-img" src="" crossorigin="anonymous">
        <img id="heatmap-tex" src="" crossorigin="anonymous">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <!-- The AR dashboard floating above the marker -->
        <a-entity position="0 0.8 0" scale="1.2 1.2 1.2">
          <!-- Base Eye Image -->
          <a-plane id="plane-base" src="#base-img" position="0 0 0" height="1" width="1" rotation="0 0 0"></a-plane>
          
          <!-- Heatmap Overlay -->
          <a-plane id="plane-heatmap" src="#heatmap-tex" position="0 0 0.01" height="1" width="1" rotation="0 0 0" opacity="0.85" material="transparent: true; alphaTest: 0.1;" visible="false"></a-plane>
          
          <!-- Diagnostic Text -->
          <a-entity position="0 0.65 0">
            <a-plane width="1.2" height="0.2" color="#000" opacity="0.8" position="0 0 -0.01" material="transparent: true"></a-plane>
            <a-text id="grade-text" value="LOADING..." align="center" position="0 0 0" scale="0.6 0.6 0.6" color="#fff" font="kelsonsans"></a-text>
          </a-entity>
          
          <a-plane id="plane-border" position="0 0 0.02" width="1" height="1" material="shader: flat; wireframe: true; opacity: 0.5"></a-plane>
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
       const params = new URLSearchParams(window.location.search);
       const grade = params.get('grade') || '0';
       const heatmapUrl = params.get('heatmap') || '';
       const imageUrl = params.get('image') || '';
       
       const GRADE_META = {
         '0': { name: 'No DR (Healthy)', color: '#10b981' },
         '1': { name: 'Mild NPDR', color: '#facc15' },
         '2': { name: 'Moderate NPDR', color: '#fb923c' },
         '3': { name: 'Severe NPDR', color: '#ef4444' },
         '4': { name: 'Proliferative DR', color: '#b91c1c' }
       };
       const meta = GRADE_META[grade] || GRADE_META['0'];

       // Dynamically update the A-Frame assets and components
       document.addEventListener('DOMContentLoaded', () => {
           if (imageUrl) {
               document.getElementById('base-img').setAttribute('src', imageUrl);
           }
           if (heatmapUrl) {
               document.getElementById('heatmap-tex').setAttribute('src', heatmapUrl);
               document.getElementById('plane-heatmap').setAttribute('visible', 'true');
           }
           
           document.getElementById('grade-text').setAttribute('value', `GRADE ${grade}: ${meta.name.toUpperCase()}`);
           document.getElementById('grade-text').setAttribute('color', meta.color);
           document.getElementById('plane-border').setAttribute('color', meta.color);
       });
    </script>
  </body>
</html>
