<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RetinaFlow WebAR</title>
    <!-- A-Frame and MindAR for WebAR tracking -->
    <script src="./aframe.min.js"></script>
    <script src="./mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
      
      #ui-layer {
        position: absolute;
        top: 0; left: 0; width: 100%;
        z-index: 100;
        pointer-events: none;
        padding: 24px;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      }
      .title {
        color: #fff; font-size: 28px; font-weight: 900;
        text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        letter-spacing: -0.03em;
      }
      .title span { color: #06b6d4; }
      .subtitle {
        color: #e2e8f0; font-size: 14px; margin-top: 4px;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      }
      
      #back-btn {
        position: absolute; bottom: 30px; left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        background: rgba(6, 182, 212, 0.2);
        border: 1px solid rgba(6, 182, 212, 0.5);
        color: #06b6d4;
        border-radius: 12px;
        font-weight: bold;
        text-decoration: none;
        pointer-events: auto;
        backdrop-filter: blur(10px);
        z-index: 100;
      }

      /* MindAR loading screen override */
      .mindar-ui-overlay { background: rgba(0,0,0,0.8); }
      .mindar-ui-loading .loader { border-top-color: #06b6d4 !important; }
    </style>
  </head>
  <body>
    <div id="ui-layer">
      <div class="title">Retina<span>Flow</span> AR</div>
      <div class="subtitle">Point camera at the printed fundus image to view AI diagnosis.</div>
    </div>
    
    <a href="javascript:history.back()" id="back-btn">← Close AR View</a>

    <!-- AR Scene (requires targets.mind in the public folder) -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiError:yes; uiLoading:yes; uiScanning:yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="heatmap-tex" src="" crossorigin="anonymous">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <!-- Background Plane to darken the original image slightly -->
        <a-plane position="0 0 0" height="1" width="1" rotation="0 0 0" color="#000" opacity="0.3" material="transparent: true"></a-plane>

        <!-- Overlay Heatmap exactly over the target image -->
        <a-plane id="heatmap-plane" src="#heatmap-tex" position="0 0 0" height="1" width="1" rotation="0 0 0" opacity="0.85" material="transparent: true; alphaTest: 0.1;"></a-plane>
        
        <!-- Text for Grade (Marked on image) -->
        <a-entity position="0 0.65 0">
          <a-plane width="1.2" height="0.2" color="#000" opacity="0.7" position="0 0 -0.01" material="transparent: true"></a-plane>
          <a-text id="grade-text" value="Detecting Grade..." align="center" position="0 0 0" scale="0.6 0.6 0.6" color="#06b6d4" font="kelsonsans"></a-text>
        </a-entity>
        
        <!-- Scanning Box effect -->
        <a-plane position="0 0 0.01" width="1" height="1" material="shader: flat; color: #06b6d4; wireframe: true; opacity: 0.5"></a-plane>

      </a-entity>
    </a-scene>

    <script>
       // Read URL params passed from the frontend
       const params = new URLSearchParams(window.location.search);
       const grade = params.get('grade') || '0';
       const heatmapUrl = params.get('heatmap') || '';
       
       const GRADE_META = {
         '0': { name: 'No DR (Healthy)', color: '#10b981' }, // Emerald
         '1': { name: 'Mild NPDR', color: '#facc15' },      // Yellow
         '2': { name: 'Moderate NPDR', color: '#fb923c' },  // Orange
         '3': { name: 'Severe NPDR', color: '#ef4444' },    // Red
         '4': { name: 'Proliferative DR', color: '#b91c1c' }// Dark Red
       };

       const meta = GRADE_META[grade] || GRADE_META['0'];

       // Apply heatmap texture
       if (heatmapUrl) {
           document.getElementById('heatmap-tex').src = heatmapUrl;
       }

       // Update Grade Text
       const gradeText = document.getElementById('grade-text');
       gradeText.setAttribute('value', `GRADE ${grade}: ${meta.name.toUpperCase()}`);
       gradeText.setAttribute('color', meta.color);
    </script>
  </body>
</html>
